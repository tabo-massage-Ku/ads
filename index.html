<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>توظيف فوري - معالجين مساج في الكويت</title>
    <!-- أيقونات فونت أوسم -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b2a35, #1a4b5a);
            padding: 20px;
            position: relative;
        }

        /* الخلفية مع تأثير ضبابي */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://img.freepik.com/free-photo/young-woman-getting-massage-spa_1303-26552.jpg') center/cover no-repeat;
            opacity: 0.15;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* الشعار أو الأيقونة الرئيسية */
        .icon-big {
            font-size: 60px;
            color: #1a4b5a;
            background: #e3f0f5;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 2.5rem;
            color: #0b2a35;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .sub-title {
            font-size: 1.2rem;
            color: #2d6a7a;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .highlight {
            color: #e67e22;
            font-weight: bold;
        }

        .desc {
            font-size: 1.1rem;
            color: #2c3e50;
            line-height: 1.8;
            margin: 20px 0 30px;
            padding: 0 10px;
        }

        .desc i {
            color: #e67e22;
            margin: 0 5px;
        }

        /* شبكة المزايا */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin: 30px 0 35px;
        }

        .feature-item {
            background: #f0f8fc;
            padding: 15px 5px;
            border-radius: 20px;
            transition: 0.3s;
            border-bottom: 3px solid #1a4b5a;
        }

        .feature-item i {
            font-size: 28px;
            color: #1a4b5a;
            display: block;
            margin-bottom: 8px;
        }

        .feature-item span {
            font-weight: 600;
            color: #0b2a35;
            font-size: 0.95rem;
        }

        /* حاوية الأزرار */
        .buttons-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 15px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 45px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            transition: 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            flex: 1 1 200px;
            min-width: 180px;
        }

        .btn-phone {
            background: linear-gradient(135deg, #2d7d8a, #1a4b5a);
        }

        .btn-phone:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(26, 75, 90, 0.4);
            background: linear-gradient(135deg, #1a4b5a, #0b2a35);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }

        .btn-whatsapp:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
            background: linear-gradient(135deg, #128C7E, #075E54);
        }

        .btn i {
            font-size: 1.6rem;
        }

        /* رقم الهاتف بشكل بارز */
        .phone-number {
            display: inline-block;
            background: #eef6f9;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b2a35;
            letter-spacing: 2px;
            margin: 15px 0 5px;
            border: 2px dashed #1a4b5a;
            direction: ltr;
        }

        .phone-number i {
            color: #e67e22;
            margin-left: 10px;
        }

        .copy-hint {
            font-size: 0.8rem;
            color: #5d7d8a;
            margin-top: 5px;
        }

        .footer-note {
            margin-top: 35px;
            font-size: 0.9rem;
            color: #3d5f6b;
            border-top: 1px solid #dce8ed;
            padding-top: 25px;
        }

        .footer-note i {
            color: #e67e22;
        }

        /* responsive */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .btn {
                padding: 15px 25px;
                font-size: 1rem;
                flex: 1 1 100%;
            }
            .phone-number {
                font-size: 1.4rem;
                padding: 10px 18px;
            }
            .icon-big {
                width: 80px;
                height: 80px;
                line-height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- أيقونة رئيسية -->
    <div class="icon-big">
        <i class="fas fa-spa"></i>
    </div>

    <h1>مطلوب فوراً</h1>
    <div class="sub-title">
        <i class="fas fa-user-md" style="color:#e67e22;"></i>
        معالجين و معالجات <span class="highlight">مساج محترفين</span>
        <i class="fas fa-user-md" style="color:#e67e22;"></i>
    </div>

    <p class="desc">
        <i class="fas fa-map-pin"></i> داخل الكويت <i class="fas fa-map-pin"></i>
        <br>
        مرتبات مجزية + بيئة عمل متميزة
        <br>
        <span style="font-size:0.9rem; color:#1a4b5a;">
            <i class="fas fa-check-circle" style="color:#27ae60;"></i>  دوام كامل / مرن
            <i class="fas fa-check-circle" style="color:#27ae60; margin-right:12px;"></i>  تأمين صحي
        </span>
    </p>

    <!-- مزايا سريعة (أضفتها من عندي) -->
    <div class="features">
        <div class="feature-item">
            <i class="fas fa-calendar-check"></i>
            <span>مرتب شهري ثابت</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-clock"></i>
            <span>ساعات مرنة</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-users"></i>
            <span>فريق محترف</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-hand-holding-heart"></i>
            <span>مكافآت وحوافز</span>
        </div>
    </div>

    <!-- رقم الهاتف بشكل واضح -->
    <div class="phone-number">
        <i class="fas fa-phone-alt"></i> 90947281
    </div>
    <div class="copy-hint">
        <i class="fas fa-mouse-pointer"></i> اضغط على الرقم لنسخه
    </div>

    <!-- الأزرار الرئيسية -->
    <div class="buttons-wrapper">
        <!-- زر اتصال -->
        <a href="tel:90947281" class="btn btn-phone">
            <i class="fas fa-phone-alt"></i> اتصل بنا
        </a>
        <!-- زر واتساب -->
        <a href="https://wa.me/96590947281" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> واتساب
        </a>
    </div>

    <!-- ملاحظة إضافية (أضفتها من عندي) -->
    <div class="footer-note">
        <i class="fas fa-star" style="color:#f1c40f;"></i>
        سارع بتقديم طلبك .. المقاعد محدودة
        <i class="fas fa-star" style="color:#f1c40f;"></i>
        <br>
        <span style="font-size:0.8rem; opacity:0.7;">
            <i class="fas fa-shield-alt"></i> جميع المعلومات سرية
        </span>
    </div>

</div>

<!-- JavaScript صغير لإضافة تفاعل نسخ الرقم -->
<script>
    // عند الضغط على رقم الهاتف يتم نسخه
    document.querySelector('.phone-number').addEventListener('click', function() {
        const phone = this.innerText.replace(/[^0-9]/g, ''); // استخراج الأرقام فقط
        navigator.clipboard.writeText(phone).then(() => {
            // رسالة منبثقة صغيرة
            const hint = document.querySelector('.copy-hint');
            const originalText = hint.innerHTML;
            hint.innerHTML = '<i class="fas fa-check-circle" style="color:#27ae60;"></i> تم نسخ الرقم!';
            hint.style.color = '#27ae60';
            setTimeout(() => {
                hint.innerHTML = originalText;
                hint.style.color = '#5d7d8a';
            }, 2000);
        }).catch(() => {
            alert('يمكنك نسخ الرقم يدوياً: 90947281');
        });
    });

    // تأثير ظهور الصفحة (اختياري)
    window.addEventListener('load', function() {
        document.querySelector('.container').style.animation = 'fadeInUp 0.8s ease';
    });

    // يمكن إضافة كي فرين مزود بـ keyframes في CSS
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .container {
            animation: fadeInUp 0.8s ease;
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
